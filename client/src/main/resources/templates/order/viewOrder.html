<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cloud App | Order Details</title>
    <link th:href="${@environment.getProperty('app.cdn.bootstrap-css')}" rel="stylesheet" />
    <link th:href="${@environment.getProperty('app.cdn.bootstrap-icons')}" rel="stylesheet" />
</head>
<body>
<div class="container" id="container" style="margin-top: 50px; margin-bottom: 50px;">
    <div class="card">
        <h2 th:text="${title}" class="card-header"></h2>
        <div class="card-body">
            <div class="mb-3">
                <label for="quantity" class="form-label">Number of units from the product</label>
                <input type="number" class="form-control" th:value="*{order.quantity}" id="quantity" name="userID" readonly>
            </div>
            <div class="mb-3">
                <label for="total" class="form-label">Price (€)</label>
                <input type="number" step="0.01" class="form-control" th:value="*{order.total}" id="total" name="total" readonly>
            </div>
            <div class="mb-3">
                <label for="date" class="form-label">Date in which it was made</label>
                <input type="text" class="form-control" th:value="*{order.date}" id="date" name="date" readonly>
            </div>
            <div class="card" style="margin-left: 20px; margin-right: 20px; margin-bottom: 10px;">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h2 class="mb-0">Product</h2>
                </div>
                <div class="card-body">
                    <table class="table table-hover">
                        <thead class="thead-light">
                        <tr>
                            <th scope="col">ID</th>
                            <th scope="col">Name</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr>
                            <td th:text="${order.product.id}"></td>
                            <td th:text="${order.product.name}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="card" style="margin-left: 20px; margin-right: 20px; margin-bottom: 10px;">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h2 class="mb-0">User</h2>
                </div>
                <div class="card-body">
                    <table class="table table-hover">
                        <thead class="thead-light">
                        <tr>
                            <th scope="col">ID</th>
                            <th scope="col">Name</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr>
                            <td th:text="${order.user.id}"></td>
                            <td th:text="${order.user.fullName}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <hr>
    <a class="btn btn-primary" th:href="@{/oorders/list}">Return</a>
</div>
<script th:src="${@environment.getProperty('app.cdn.bootstrap-js')}"></script>
</body>
</html>
