<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cloud App</title>
    <link th:href="${@environment.getProperty('app.cdn.bootstrap-css')}" rel="stylesheet" />
    <link th:href="${@environment.getProperty('app.cdn.bootstrap-icons')}" rel="stylesheet" />
</head>
<body>
<div class="container" style="margin-top: 50px; margin-bottom: 50px;">
    <h1 class="text-center">Orders Management</h1>
    <div class="card-group">
        <div class="card">
            <div class="card-body">
                <i class="bi bi-gem" style="font-size: 30px"></i>
                <h3 class="card-title">Users</h3>
                <a class="btn btn-link" th:href="@{/uusers/list}">Users List</a>
            </div>
        </div>
        <div class="card">
            <div class="card-body">
                <i class="bi bi-film" style="font-size: 30px"></i>
                <h3 class="card-title">Orders</h3>
                <a class="btn btn-link" th:href="@{/oorders/list}">Orders List</a>
            </div>
        </div>
        <div class="card">
            <div class="card-body">
                <i class="bi bi-person" style="font-size: 30px"></i>
                <h3 class="card-title">Products</h3>
                <a class="btn btn-link" th:href="@{/pproducts/list}">Products List</a>
            </div>
        </div>
    </div>
</div>
<script th:src="${@environment.getProperty('app.cdn.bootstrap-js')}"></script>
</body>
</html>
