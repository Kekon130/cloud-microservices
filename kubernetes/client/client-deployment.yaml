apiVersion: apps/v1
kind: Deployment
metadata:
  name: client-deployment
  namespace: cloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client
      version: v1
  template:
    metadata:
      labels:
        app: client
        version: v1
    spec:
      containers:
      - name: client
        image: client-service:1.0
        env:
          - name: USERS_HOST
            valueFrom:
              configMapKeyRef:
                name: client-configmap
                key: users-microservice
          - name: PRODUCTS_HOST
            valueFrom:
              configMapKeyRef:
                name: client-configmap
                key: products-microservice
          - name: ORDERS_HOST
            valueFrom:
              configMapKeyRef:
                name: client-configmap
                key: orders-microservice
        ports:
          - name: app-port
            containerPort: 9000
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "300m"
            memory: "512Mi"
        livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: app-port
            initialDelaySeconds: 90
            periodSeconds: 15
            successThreshold: 1
            failureThreshold: 10
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: app-port
          initialDelaySeconds: 60
          periodSeconds: 15
          successThreshold: 1
          failureThreshold: 10