spring:
  application:
    name: orders-microservice
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST}:3306/Cloud_DB?useSSL=false&serverTimezone=Europe/Madrid&&allowPublicKeyRetrieval=true
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    generate-ddl: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: true
    hibernate:
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
app:
  version: ${APP_VERSION:v1}
server:
  port: 8000
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
microservices:
  users:
    url: http://${USERS_HOST}:8000
  products:
    url: http://${PRODUCTS_HOST}:8000